services:

  postgres:
    image: postgres:15
    container_name: meteo_postgres
    restart: always

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: meteo_france

    ports:
      - "5434:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  metabase:
    image: metabase/metabase
    container_name: meteo_metabase
    restart: always

    ports:
      - "10000:3000"

    depends_on:
      - postgres

volumes:
  postgres_data: